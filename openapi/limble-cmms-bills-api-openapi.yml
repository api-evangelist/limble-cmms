                userIDMarkPaid: 0
                billNumber: 1
                locationID: 163
                date: 1597443703
                meta:
                  items: /v2/po/items?pos=5
                  po: /v2/po?pos=5
                  transactions: /v2/bills/transactions?bills=1
        '400':
