        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Bills
      description: 'This request gets information such as Bill IDs, Bill Numbers, etc.


        This call returns a "meta" object containing URLs that can be used to get data related to the Bill.


        Note: this endpoint supports pagination. Please refer to the [**Pagination**](#pagination) section for more information.


        Return data description


        Property: meta, Description: useful links relating to this Bill

        Property: billID, Description: The unique ID of the Bill.

        Property: billNumber, Description: The bill number assigned to the Bill.

        Property: poID, Description: The poID of which the Bill was made.

        Property: locationID, Description: The unique ID of the location associated with this Bill.

        Property: date, Description: The date this Bill was created as a UNIX timestamp.

        Property: status, Description: The status of this Bill. The status can be as follows: 0: The bill is setup. 1: The bill is submitted. 2: The bill is closed i.e. Marked as Paid

        Property: userID, Description: The Id of the user this Bill was assigned to.

        Property: userIDStarted, Description: The ID of the user this Bill was created by.

        Property: userIDMarkPaid, Description: The ID of the user this Bill was marked paid by.'
