        categoryID:
          type: integer
        locationID:
          type: integer
        location:
          type: string
        minQtyStatus:
          type: integer
        minQtyThreshold:
          type: integer
        maxQtyThreshold:
          type: integer
        staleThreshold:
          type: integer
        staleStatus:
          type: integer
        lastEdited:
          type: integer
        userID:
          type: integer
        teamID:
          type: integer
        stockOnHand:
          type: integer
        pos:
          type: array
          items:
            type: object
            properties:
              quantity:
                type: integer
              quantityUsed:
                type: integer
              price:
                type: number
              poItemID:
                type: integer
        image:
          type: array
    ErrorResponse:
      description: 'Error response body. The API emits two shapes today: the standard `{ message }` shape returned by the central error handler and most controllers, and the legacy `{ error, success, msg }` shape returned by the auth middleware. Some controllers also include extra fields (e.g. `success`, conflict metadata).'
      oneOf:
      - type: object
        required:
        - message
        properties:
          message:
            type: string
          success:
            type: boolean
          raw:
            description: Optional raw error object (validation errors).
      - type: object
        required:
        - error
        - msg
        properties:
          error:
            type: integer
            description: Numeric HTTP status echoed in the body.
          success:
            type: boolean
          msg:
            type: string
