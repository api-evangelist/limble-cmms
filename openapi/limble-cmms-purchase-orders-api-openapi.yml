            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
              example:
                success: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Purchase Orders
      description: 'This request updates a Purchase Order Item. Considering the validation for this route is non-trivial -- keep in mind that before this update takes place, we validate the resulting PO Item, so the itemType must be valid with any existing or updated properties. For example, if you have a PO Item of itemType 1 (Part) and attempt to send a PATCH that only provides a checklistID, you will get an error back saying that this is an invalid combination.


        To remove an associated ID, pass in the value 0.


        itemType | Int | Optional | A number describing what type of PO Item this is. Valid values are: 1 (Part), 2 (Service), 4 (Other). If itemType is 1, name and taskID cannot be present and partID is required. If itemType is 2 or 4, name is required and partID cannot be present. If itemType is 2, a checklistID is required.

        name | String | Optional | A short line-item title for this PO Item.

        description | String | Optional | A more detailed description for this PO Item.

        glID | Int | Optional | The ID of the General Ledger that this PO Item will belong to.

        taskID | Int | Optional | The ID of the Task that this PO Item will belong to.

        assetID | Int | Optional | The ID of the Asset that this PO Item will belong to.

        partID | Int | Optional | The ID of the Part that this PO Item will belong to.

        quantity | Int | Optional | A number for how many items are represented in this line. If not provided, the minimum and default values are 1.

        rate | Float | Optional | A decimal (precision 4) representing the cost of one of the item(s). Default is 0.0000

        tax | Float | Optional | A decimal (precision 4) representing the amount of tax on the item(s) as a percent. Default is 0.0000

        discount | Float | Optional | A decimal (precision 4) representing the discounted cost on the item(s) as a percent. Default is 0.0000

        shipping | Float | Optional | A decimal (precision 4) representing the cost of shipping for the item(s). Default is 0.0000'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                itemType:
                  type: integer
                glID:
                  type: integer
                assetID:
                  type: integer
                partID:
                  type: integer
                quantity:
                  type: integer
                rate:
                  type: number
                tax:
                  type: number
                discount:
                  type: integer
                shipping:
                  type: number
            example:
              itemType: 1
              glID: 0
              assetID: 0
              partID: 4
              quantity: 5
              rate: 3.5
              tax: 7.25
              discount: 0
              shipping: 24.99
    delete:
      operationId: deletePoByPoIDItemsByPoItemID
      summary: Delete PO Item
      responses:
        '200':
          $ref: '#/components/responses/EmptySuccess'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Purchase Orders
      description: This request deletes a PO Item, which will also remove any relationships between the PO Item, Parts, and Tasks, and will clean up any history of transactions on this PO Item.
    put:
      operationId: putPoByPoIDItemsByPoItemID
      summary: Receive PO Item
      responses:
        '200':
          description: Receive PO Item
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionID:
                    type: integer
                  prID:
                    type: integer
              example:
                transactionID: 1
                prID: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Purchase Orders
      description: 'This request marks a quantity of a PO item as having been received and generates a bill for the receipt of the item.


        Parameter: quantity, Type: Int, Required?: Required, Description: A positive number representing the received number of items. The sum of all receipts cannot be greater than the total quantity on the PO item., For example: if a PO item has a quantity of 5, then we use this request to receive 3, that will mark 3 of the PO item as received and generate a bill for that receipt of 3 PO items. If we run the same request again to receive another 3, the total would be 6 and the request would be rejected with an error.


        Return data description


        Property: transactionID, Description: The unique ID of the transaction created by this request.

        Property: prID, Description: The unique ID of the PR (Bill) created by this request.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                quantity:
                  type: integer
            example:
              quantity: 100
