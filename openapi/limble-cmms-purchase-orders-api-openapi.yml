    get:
      operationId: getPoByPoIDStateTransitions
      summary: Get PO State Transitions
      responses:
        '200':
          description: 200 OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentState:
                    type: object
                    properties:
                      number:
                        type: integer
                      name:
                        type: string
                      label:
                        type: string
                  validNextStates:
                    type: array
                    items:
                      type: object
                      properties:
                        number:
                          type: integer
                        name:
                          type: string
                        label:
                          type: string
                  requirements:
                    type: object
                    properties:
                      ready_to_receive:
                        type: object
                        properties:
                          vendorRequired:
                            type: boolean
                      disapproved:
                        type: object
              example:
                currentState:
                  number: 0
                  name: setup
                  label: Setup
                validNextStates:
                - number: 97
                  name: ready_to_receive
                  label: Ready to Receive
                - number: 101
                  name: disapproved
                  label: Disapproved
                requirements:
                  ready_to_receive:
                    vendorRequired: true
                  disapproved: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Purchase Orders
      description: "Returns the list of valid next states for the specified PO.\n\nParameters:\n\n| Parameter | Type | Required | Default | Description |\n| --- | --- | --- | --- | --- |\n| poID | integer | yes |  | Purchase Order identifier |\n\nReturn data:  \n  \nArray of JSON objects listing possible next state transitions for the selected PO."
