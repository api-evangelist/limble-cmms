  /v2/tasks/labor:
    get:
      operationId: getTasksLabor
      summary: Task Labor
      parameters:
      - name: tasks
        in: query
        description: This parameter is used to only get specific Tasks. This parameter accepts a comma delimited list of task IDs.
        schema:
          type: string
        example: 6,11
      - name: users
        in: query
        description: This parameter is used to only get labor records for a specific user or set of users in a comma delimited list.
        schema:
          type: integer
        example: 0
      - name: start
        in: query
        description: This parameter is used to only get labor that was logged after the unix timestamp passed into the start parameter. For example, all Assets that were last edited after April 18th, 2018.
        schema:
          type: integer
        example: 1564895015
      - name: end
        in: query
        description: This parameter is used to only get labor that was logged *before* the unix timestamp passed into the end parameter.
        schema:
          type: integer
        example: 1564895015
      - name: limit
        in: query
        description: This parameter is a result limiter. The default is set to return no more than 100 results at one time.
        schema:
          type: integer
        example: 100
      - name: cursor
        in: query
        description: This parameter is a cursor that selects what taskID you want to start receiving results at. e.g. passing 137 here will only get you tasks with an id greater than 137.
        schema:
          type: integer
        example: 0
      - name: locations
        in: query
        description: This parameter is used to retrieve labor entries for particular locations. This parameter accepts a comma delimited list of location IDs.
        schema:
          type: integer
        example: 0
      - name: orderBy
        in: query
        description: This parameter is used to order results by their dateLogged property instead of the default ordering. CANNOT be provided alongside the cursor parameter. to paginate in this ordering, use the start or end parameters.
        schema:
          type: string
        example: -dateLogged
      responses:
        '200':
          description: Task Labor
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    meta:
                      type: object
                      properties:
                        task:
                          type: string
                        user:
                          type: string
                    userID:
                      type: integer
                    timeSpent:
                      type: integer
                    userWage:
                      type: integer
                    taskID:
                      type: integer
                    taskName:
                      type: string
                    tashPriorityID:
                      type: integer
                    description:
                      type: string
                      nullable: true
                    dateLogged:
                      type: integer
                    billableTime:
                      type: string
                      nullable: true
                    billableRate:
                      type: string
                      nullable: true
                    categoryID:
                      type: string
                      nullable: true
              example:
              - meta:
                  task: /v2/tasks/?tasks=7
                  user: /v2/users/?users=341
                userID: 341
                timeSpent: 7200
                userWage: 15
                taskID: 7
                taskName: Tire Rotation
                tashPriorityID: 1682
                description: null
                dateLogged: 1457559196
                billableTime: null
                billableRate: null
                categoryID: null
              - meta:
                  task: /v2/tasks/?tasks=16
                  user: /v2/users/?users=341
                userID: 341
                timeSpent: 3660
                userWage: 15
                taskID: 16
                description: null
                dateLogged: 1457569392
                billableTime: null
                billableRate: null
                categoryID: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'This request gets the labor (time spent) on a Task. A single Task can have multiple times logged onto it.


        Return data description


        meta | This property contains shortcuts to other requests that can be used to get more information regarding the Task the labor was logged on and the user who logged the time.

        taskID | The Task ID associated with this labor entry.

        timeSpent | The amount of time measure in seconds.

        userWage | The wage per hour.

        description | A description of the labor entry.

        dateLogged | The date that this time was logged on the Task.

        billableTime | The amount of time that is billable for this Task.

        billableRate | The rate at which this labor entry is billed at.

        categoryID | The labor category this entry is associated with.

        taskName | The name of the task associated with this labor entry.

        taskPriorityID | The Priority ID of the task this labor entry is associated with.

        taskPriorityLevel | The Priority value of the task this labor entry is associated with.'
