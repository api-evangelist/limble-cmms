          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'This request creates a new Purchase Order.


        Parameter: locationID, Type: Int, Required?: Required, Description: The ID of the location this PO will be created for.

        Parameter: vendorID, Type: Int, Required?: Required, Description: The ID of the vendor that this PO will be associated with.

        Parameter: userID, Type: Int, Required?: Required, Description: The ID of the user that this PO will be assigned to.

