  /v2/users/capacity/exceptions/{userID}:
    parameters:
    - name: userID
      in: path
      required: true
      schema:
        type: string
    get:
      operationId: getUsersCapacityExceptionsByUserID
      summary: Get Capacity Exceptions by User
      parameters:
      - name: locations
        in: query
        description: Required comma-separated location IDs used to scope the user access context.
        schema:
          type: integer
        example: 1
      - name: startDate
        in: query
        description: Optional lower date bound (YYYY-MM-DD) for overlap filtering.
        schema:
          type: string
        example: '2026-01-01'
      - name: endDate
        in: query
        description: Optional upper date bound (YYYY-MM-DD) for overlap filtering. Must be >= startDate when both are present.
        schema:
          type: string
        example: '2026-01-31'
      - name: cursor
        in: query
        description: Optional ID cursor for keyset pagination.
        schema:
          type: integer
        example: 0
      - name: limit
        in: query
        description: Optional max rows per page.
        schema:
          type: integer
        example: 100
      responses:
        '200':
          description: Get User Capacity Exceptions
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    exceptionID:
                      type: integer
                    userID:
                      type: integer
                    createdByUserID:
                      type: integer
                    exceptionStartDate:
                      type: string
                      format: date
                    exceptionEndDate:
                      type: string
                      format: date
                    capacityMinutes:
                      type: integer
                    hoursPerDay:
                      type: integer
                    minutesPerDay:
                      type: integer
                    exceptionTitle:
                      type: string
                    exceptionNotes:
                      type: string
              example:
              - exceptionID: 1201
                userID: 42
                createdByUserID: 1
                exceptionStartDate: '2026-01-10'
                exceptionEndDate: '2026-01-20'
                capacityMinutes: 300
                hoursPerDay: 5
                minutesPerDay: 0
                exceptionTitle: Training Week
                exceptionNotes: Limited availability
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'Gets capacity exception records for a specific user.


        `capacityMinutes` is the user''s available capacity **per day** for each date in the exception range.


        Query behavior:

