        Both `declineReason` and `additionalNotes` are optional strings.'
  /v2/tasks:
    post:
      operationId: postTasks
      summary: New Task
      parameters:
      - name: name
        in: query
        schema:
          type: string
        example: '"Priority Test"'
      - name: locationID
        in: query
        schema:
          type: integer
        example: 34190
      - name: due
        in: query
        schema:
          type: integer
        example: 1749680211
      - name: type
        in: query
        schema:
          type: integer
        example: 2
      - name: templateID
        in: query
        schema:
          type: integer
        example: 9
      responses:
        '201':
          description: New Task
          headers:
            Location:
              schema:
                type: string
              example: /v2/tasks/?tasks=8261
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskID:
                    type: integer
              example:
                taskID: 8261
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'This request will create an empty Task, assign to a User or Team, etc.


        name | String | Required | The name of the Task.

        locationID | Int | Required | The id of the Location this Task is assigned to. Must be the Location''s unique ID number.

        due | Int | Required | The time at which the Task is due. Must be a unix timestamp.

        type | Int | Required | The type of Task according to this legend:, 1 = Preventative Maintanance (PM)., 2 = Unplanned Work Order (WO);, 4 = Planned Work Order (WO);, 6 = Work Request (WR)., Task types not listed here are not currently supported., If you would like another Task type to be supported, please contact us., A taskType of 6 prevents the user from assigning a batchID.

        description | string | Optional | A brief description about the Task.

        assetID | Int | Optional | The Asset that the Task will be attached to, if any. Must be the unique ID number of the Asset. Omitting this parameter or setting it to zero will not attach the Task to an asset.

        assignment | Int | Optional. Required if ''assignmentType'' is used. | The User or Team to which the Task will be assigned. Must be a User or Team that exists at the specified Location. Must be the unique ID number of the user or Team. If this parameter is set, the assignmentType parameter must also be set.

        templateID | Int | Optional | The taskID of the task you wish to utilize as a template when posting a new Task. Using this will duplicate all steps in the Template to the newly created task. Templates can be easily viewed and built in Limble''s web application.

        assignmentType | Enum | Optional. Required if ''assignment'' is used. | Specifies whether this Task will be assigned to a ''user'', ''team'' or ''multi''. If this parameter is set, the assignment parameter must also be set.

        priority | Int | Optional | Specifies the priority of the Task. Must correspond to a ''priorityLevel'' (See GET Priorities) configured in your Limble account.

        estimatedTime | Int | Optional | Updates the estimated time of the task. This is the time it takes to complete the task in minutes.

        scheduledStart | Int | Optional | The scheduled start date of the task. Must be a unix timestamp. Must be 0 or greater.

        scheduledEnd | Int | Optional | The scheduled end date of the task. Must be a unix timestamp. Must be 0 or greater. If both scheduledStart and scheduledEnd are provided, scheduledEnd must be greater than scheduledStart.

        requestName | string | Optional | Specifies the name of the Work Requestor.

        requestEmail | string | Optional | Specifies the email address of the Work Requestor.

        requestPhone | string | Optional | Specifies the phone number of the Work Requestor.

        requestDescription | string | Optional | Specifies the description of the problem submitted by the Work Requestor.

        meta1 | string | Optional | Task meta data. This does not show in the web application, but can be used to track items between integrated systems.

        meta2 | string | Optional | Task meta data. This does not show in the web application, but can be used to track items between integrated systems.

        meta3 | string | Optional | Task meta data. This does not show in the web application, but can be used to track items between integrated systems.

        geoLocation | geoJSON | Optional | The geoJSON Feature object that can be used to locate a task on a Map.

        multiUsers | array | Optional. Required if assignmentType = multi | Array list of users a task is being assigned to.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                locationID:
                  type: integer
                type:
                  type: integer
                due:
                  type: integer
                priority:
                  type: integer
                scheduledStart:
                  type: integer
                scheduledEnd:
                  type: integer
            example:
              name: Priority Test
              locationID: 34190
              type: 2
              due: 1748656599
              priority: 3
              scheduledStart: 1748650000
              scheduledEnd: 1748660000
    get:
      operationId: getTasks
      summary: Tasks
      parameters:
      - name: tasks
        in: query
        description: This parameter is used to only get specific Tasks. This parameter accepts a comma delimited list of task IDs.
        schema:
          type: integer
        example: 9109
      - name: assets
        in: query
        description: This parameter is used to only get Tasks that are linked to an asset. This parameter accepts a comma delimited list of asset IDs.
        schema:
          type: integer
        example: 1
      - name: locations
        in: query
        description: This parameter is used to only get Tasks at a specific group of Locations. This parameter accepts a comma delimited list of Location IDs.
        schema:
          type: integer
        example: 73
      - name: type
        in: query
        description: This parameter is used to only get Tasks of a specific type. This parameter accepts a comma delimited list of task types.
        schema:
          type: integer
        example: 6
      - name: name
        in: query
        description: This is a parameter used to string search for a name or partial name of a task this parameter expects a string with the wildcard %.
        schema:
          type: string
        example: '%test%'
      - name: start
        in: query
        description: This parameter is used to only get Tasks that were last edited after the unix timestamp passed into the start parameter. For example, all Tasks that were last edited after April 18th, 2018.
        schema:
          type: integer
        example: 1000000000
      - name: end
        in: query
        description: This parameter is used to only get Tasks that were last edited before the unix timestamp passed into the end parameter.
        schema:
          type: integer
        example: 2500000000
      - name: cursor
        in: query
        description: This parameter is a cursor that selects what taskID you want to start receiving results at. e.g. passing 137 here will only get you tasks with an id greater than 137.
        schema:
          type: integer
        example: 0
      - name: limit
        in: query
        description: This parameter is a result limiter. The default is set to return no more than 100 results at one time.
        schema:
          type: integer
        example: 2
      - name: page
        in: query
        description: This parameter is used to paginate results based on the limit. Refer to Pagination section for more information.
        schema:
          type: integer
        example: 2
      - name: completedStart
        in: query
        description: This parameter is used to only get Tasks that were completed after the unix timestamp passed into this parameter. For example, all Assets that were completed after April 18th, 2018.
        schema:
          type: integer
        example: 0
      - name: completedEnd
        in: query
        description: This parameter is used to only get Tasks that were completed before the unix timestamp passed into this parameter.
        schema:
          type: integer
        example: 2500000000
      - name: scheduledStart
        in: query
        description: This parameter is used as the start of a scheduled-date window. Tasks are returned when their scheduled date range overlaps this timestamp.
        schema:
          type: integer
        example: 0
      - name: scheduledEnd
        in: query
        description: This parameter is used as the end of a scheduled-date window. Tasks are returned when their scheduled date range overlaps this timestamp.
        schema:
          type: integer
        example: 2500000000
      - name: orderBy
        in: query
        description: This parameter sorts based on the value you pass. Negative parameters are used to reverse sort order. This supports sorting by due, createdDate, dateCompleted, scheduledStart, scheduledEnd, and lastEdited.
        schema:
          type: string
        example: -createdDate
      - name: geoLocation
        in: query
        description: This parameter is used to filter results that contain a geoLocation property. By default it is false and will return all tasks with and without geoLocation property. If true, it will only return tasks with a geoLocation property.
        schema:
          type: boolean
        example: true
      - name: users
        in: query
        description: This parameter filters tasks by assignee user IDs. It returns tasks directly assigned to those users and tasks assigned through team/profile membership (including multi-user assignments). This parameter accepts a comma delimited list of user IDs.
        schema:
          type: integer
        example: 11
      - name: teams
        in: query
        description: This parameter is used to only get Tasks assigned to specific teams/profiles. This parameter accepts a comma delimited list of team IDs.
        schema:
          type: integer
        example: 500
      - name: lastEditedByUsers
        in: query
        description: This parameter is used to filter tasks by users who last edited the task.
        schema:
          type: string
        example: 0,340,341
      - name: status
        in: query
        description: This parameter is used to filter tasks by completed status. 1 - Complete  0 - Incomplete
        schema:
          type: integer
        example: 1
      - name: meta1
        in: query
        description: This parameter is used to filter tasks by task meta data. This does not show in the web application, but can be used to track items between integrated systems.
        schema:
          type: integer
        example: 1
      - name: meta2
        in: query
        description: This parameter is used to filter tasks by task meta data. This does not show in the web application, but can be used to track items between integrated systems.
        schema:
          type: integer
        example: 2
      - name: meta3
        in: query
        description: This parameter is used to filter tasks by task meta data. This does not show in the web application, but can be used to track items between integrated systems.
        schema:
          type: integer
        example: 3
      - name: statusIDs
        in: query
        description: This parameter is used to filter tasks by their associated statusID.
        schema:
          type: string
        example: 0,1,2
      - name: tag
        in: query
        description: This parameter is used to filter results that contain a certain custom tag. The tag must match exactly, i.e. "Tag" would not match "My Custom Tag". Searching for "@My Custom Tag;" is equivalent to searching for "My Custom Tag" but because custom tags are stored with an at sign ("@") at the beginning and a semicolon (";") at the end it is recommended that the param follows the same format.
        schema:
          type: string
        example: '@My Custom Tag;'
      responses:
        '200':
          description: Pagination using Page & Limit
          headers:
            Last-Page:
              schema:
                type: string
              example: /v2/tasks/?limit=2&orderBy=createdDate&completedStart=0&status=1&page=152
            Next-Page:
