        - 404: { message: ''Tag not found'' }

        - 400: { removed: null, message: string } — Invalid input.'
  /v2/work-requests/work-request-submissions:
    get:
      operationId: getWorkRequestsWorkRequestSubmissions
      summary: List WR Submissions
      parameters:
      - name: orderBy
        in: query
        description: This parameter is used to order results by their createdAt, status, requestTitle, workRequestSubmissionID, and location property instead of the default ordering. each property can be flipped reverse by putting a minus before the property e.g. "-createdAt".
        schema:
          type: string
        example: createdAt
      - name: search
        in: query
        description: Free-text search
        schema:
          type: string
        example: pump
      - name: locationIDs
        in: query
        description: This parameter is used to only get work requests at a specific group of Locations. This parameter accepts a comma delimited list of Location IDs.
        schema:
          type: integer
        example: 1
      - name: statuses
        in: query
        description: CSV of statuses
        schema:
          type: string
        example: open
      - name: limit
        in: query
        description: Max rows
        schema:
          type: integer
        example: 100
      - name: columns
        in: query
        description: CSV of field names (letters only); forwarded upstream as array
        schema:
          type: string
      - name: createdDateStart
        in: query
        description: ISO 8601 start
        schema:
          type: string
        example: '2025-06-20T20:51:13.000Z'
      - name: createdDateEnd
        in: query
        description: ISO 8601 end (≥ start)
        schema:
          type: string
        example: '2025-06-20T20:51:13.000Z'
      - name: workRequestIDs
        in: query
        description: CSV of WR IDs
        schema:
          type: string
        example: 1,2,3
      - name: page
        in: query
        description: Page-based pagination (mutually exclusive with cursor)
        schema:
          type: integer
        example: 1
      - name: cursor
        in: query
        description: Cursor for pagination (forbidden with page)
        schema:
          type: integer
        example: 1
      responses:
        '200':
          description: List of work request submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkRequestSubmission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'Lists WR submissions


        Return data description:


        | **Property** | **Description** |

        | --- | --- |

        | workRequestSubmissionId | The unique identifier of the work request submission. |

        | status | Pending, Approved or Rejected. |

        | createdByUserId | The unique identifier of the user who created the work request submission. |

        | createdAt | The date the work request submission was created. The timestamp is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS (21:36:31) |

        | updatedAt | The date the work request submission was last updated. The timestamp is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS (21:36:31) |

        | deletedAt | The date the work request submission was deleted. The timestamp is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS (21:36:31) Will be NULL if the submission is not deleted. |

        | reviewedByUserId | The unique identifier of the user who reviewed the submission. |

        | reviewedAt | The date the work request submission was reviewed. The timestamp is in the following format: YYYY-MM-DD (2025-07-02) HH:MM:SS (21:36:31) Will be NULL if the submission has not yet been reviewed |

        | reviewedReason | The predefined reason the work request was declined. |

        | additionalNotes | Any additional notes the person who declined the submission wishes to leave. |

        | locationId | The unique identifier of the location the submission belongs to. |

        | assetId | The unique identifier of the asset associated with the submission. |

        | priorityId | The unique identifier of the priority of the submission. |

        | dueDateUnit | The unit of measure used to communicate when the task will be due. Can be “days” or “hours”. |

        | requestInformation | The information filled out in the Work Request Portal. Includes any of the following fields in JSON format. customerCode requesterName requesterEmail requesterPhone timeUnix customTag customFieldOne customFieldTwo customFieldThree customFieldOneTitle customFieldTwoTitle customFieldThreeTitle customFieldDropdownAnswerOne customFieldDropdownAnswerTwo customFieldDropdownAnswerThree customDropdownTitleOne customDropdownTitleTwo customDropdownTitleThree customDropdownOptionsOne customDropdownOptionsTwo customDropdownOptionsThree geoLocation |

        | customerID | The unique identifier of the customer account. |

        | requestTitle | The title of the submission. |

        | assignedToProfileId | The Limble profile the submission is assigned to. This is used to determine what team or individual is assigned to review the submission. |

        | requestDescription | The description of the problem filled out in the Work Request Portal. |

        | checklistID | The unique identifier of the task generated from the submission when it is approved. Will be NULL if submission status is declined or pending. |

        | requesterName | The name of the person who submitted the work request submission. |'
    post:
      operationId: postWorkRequestsWorkRequestSubmissions
      summary: Create WR Submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - locationID
              - dueDateUnit
              properties:
                locationID:
                  type: integer
                  description: The location ID for the work request submission.
                assetID:
                  type: integer
                  description: The asset ID associated with the submission.
                  nullable: true
                parts:
                  type: array
                  items:
                    type: object
                    properties:
                      partID:
                        type: number
                      quantity:
                        type: number
                attachments:
                  type: array
                  items:
                    type: string
                timeUnix:
                  type: integer
                  description: Unix timestamp for the request.
                priorityID:
                  type: integer
                  description: Priority ID for the submission.
                  nullable: true
                dueDateUnit:
                  type: string
                  description: Unit for the due date. Can be "days" or "hours".
                requesterName:
                  type: string
                  description: Name of the person submitting the request.
                requestTitle:
                  type: string
                  description: Title of the work request submission.
                requestDescription:
                  type: string
                  description: Description of the problem.
                requestInformation:
                  type: object
                  description: Additional information from the Work Request Portal form.
                  properties:
                    customerCode:
                      type: string
                    requesterName:
                      type: string
                    requesterEmail:
                      type: string
                    requesterPhone:
                      type: string
                    geoLocation:
                      type: string
                    timeUnix:
                      type: integer
                    customFieldOne:
                      type: string
                    customFieldTwo:
                      type: string
                    customFieldThree:
                      type: string
                    customFieldOneTitle:
                      type: string
                    customFieldTwoTitle:
                      type: string
                    customFieldThreeTitle:
                      type: string
            example:
              locationID: 205
              assetID: 10836
              dueDateUnit: days
              requesterName: John Doe
              requestTitle: Broken pump
              requestDescription: The pump on floor 2 is leaking.
      responses:
        '200':
          description: Work request submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkRequestSubmission'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'Creates a new work request submission. The submission enters a pending state and must be approved or declined by a reviewer.


        `locationID` and `dueDateUnit` are required. All other fields are optional.'
  /v2/work-requests/work-request-submissions/{workRequestSubmissionID}/approve:
