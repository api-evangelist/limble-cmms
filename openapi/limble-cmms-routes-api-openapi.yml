    get:
      operationId: getUsersCapacitySchedules
      summary: Get Capacity Schedules
      parameters:
      - name: locations
        in: query
        description: Required comma-separated location IDs to scope users.
        schema:
          type: string
        example: 1,3
      - name: users
        in: query
        description: Optional comma-separated user IDs filter.
        schema:
          type: string
        example: 42,57
      - name: startDate
        in: query
        description: Required start date (YYYY-MM-DD).
        schema:
          type: string
        example: '2026-01-05'
      - name: endDate
        in: query
        description: Required end date (YYYY-MM-DD), must be >= startDate and within 31 days.
        schema:
          type: string
        example: '2026-01-07'
      - name: cursor
        in: query
        description: Optional zero-based user offset for pagination.
        schema:
          type: integer
        example: 0
      - name: limit
        in: query
        description: Optional page size (1-100).
        schema:
          type: integer
        example: 100
      responses:
        '200':
          description: Get Capacity Schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  range:
                    type: object
                    properties:
                      startDate:
                        type: string
                        format: date
                      endDate:
                        type: string
                        format: date
                  locations:
                    type: array
                    items:
                      type: integer
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        userID:
                          type: integer
                        locations:
                          type: array
                          items:
                            type: integer
                        days:
                          type: array
                          items:
                            type: object
                            properties:
                              date:
                                type: string
                                format: date
                              capacityMinutes:
                                type: integer
                              hoursPerDay:
                                type: integer
                              minutesPerDay:
                                type: integer
                              isAvailable:
                                type: boolean
                              appliedRule:
                                type: string
                              reason:
                                type: string
                              reasonDetails:
                                type: object
                                properties:
                                  scheduleID:
                                    type: integer
                                  profileID:
                                    type: string
                                    nullable: true
                  pagination:
                    type: object
                    properties:
                      cursor:
                        type: integer
                      limit:
                        type: integer
                      totalUsers:
                        type: integer
                      nextCursor:
                        type: string
                        nullable: true
              example:
                range:
                  startDate: '2026-01-05'
                  endDate: '2026-01-07'
                locations:
                - 1
                - 3
                users:
                - userID: 42
                  locations:
                  - 1
                  days:
                  - date: '2026-01-05'
                    capacityMinutes: 300
                    hoursPerDay: 5
                    minutesPerDay: 0
                    isAvailable: true
                    appliedRule: userSchedule
                    reason: Capacity from user schedule
                    reasonDetails:
                      scheduleID: 1201
                      profileID: null
                pagination:
                  cursor: 0
                  limit: 100
                  totalUsers: 1
                  nextCursor: null
        '400':
          $ref: '#/components/responses/ValidationLimitExceeded'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'Returns per-user daily capacity rows for a date range, including applied precedence details.


        Precedence order:

        `exception > holiday > userSchedule > profileSchedule > default`.


        Pagination:

        - `cursor` is a zero-based offset.

        - `limit` max is 100.


        Date limits:

        - `startDate` and `endDate` are required (YYYY-MM-DD).

        - Date range cannot exceed 31 days.


        Response notes:

        - `range` now contains only `startDate` and `endDate`.

        - `pagination` contains `cursor`, `limit`, `totalUsers`, and `nextCursor`.'
    post:
      operationId: postUsersCapacitySchedules
      summary: Create Capacity Schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - scheduleName
              - startDate
              - locationID
              properties:
                scheduleName:
                  type: string
                  maxLength: 255
                  description: Name of the schedule.
                startDate:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: Start date (YYYY-MM-DD).
                endDate:
                  type: string
                  pattern: ^\d{4}-\d{2}-\d{2}$
                  description: Optional end date (YYYY-MM-DD). Must be >= startDate.
                locationID:
                  type: integer
                  minimum: 1
                  description: Location ID for the schedule.
                userID:
                  type: integer
                  minimum: 1
                  description: User ID to assign. Mutually exclusive with profileID.
                profileID:
                  type: integer
                  minimum: 1
                  description: Team profile ID to assign. Mutually exclusive with userID.
                mondayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                tuesdayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                wednesdayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                thursdayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                fridayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                saturdayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                sundayCapacity:
                  type: integer
                  minimum: 0
                  maximum: 1440
                mondayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                mondayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                tuesdayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                tuesdayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                wednesdayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                wednesdayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                thursdayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                thursdayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                fridayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                fridayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                saturdayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                saturdayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                sundayStartTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                sundayEndTime:
                  type: string
                  pattern: ^\d{2}:\d{2}(:\d{2})?$
                rotationPatternEnabled:
                  type: boolean
                  description: Enable rotation pattern. When true, rotationWeeksOn and rotationWeeksOff are required.
                rotationWeeksOn:
                  type: integer
                  minimum: 1
                  maximum: 52
                rotationWeeksOff:
                  type: integer
                  minimum: 1
                  maximum: 52
                scheduleNotes:
                  type: string
                  maxLength: 2000
                priority:
                  type: integer
                  minimum: 0
                  maximum: 1000
                isActive:
                  type: boolean
            example:
              scheduleName: Morning Shift
              startDate: '2026-02-01'
              endDate: '2026-06-30'
              locationID: 1
              userID: 42
              mondayCapacity: 480
              tuesdayCapacity: 480
              wednesdayCapacity: 480
              thursdayCapacity: 480
              fridayCapacity: 480
              saturdayCapacity: 0
              sundayCapacity: 0
      responses:
        '201':
          description: Created
          headers:
            Location:
              schema:
                type: string
              example: /v2/users/capacity/schedules/1201
          content:
            application/json:
              schema:
                type: object
                properties:
                  scheduleID:
                    type: integer
              example:
                scheduleID: 1201
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      tags:
      - Routes
      description: 'Creates a new capacity schedule for a user or team profile at a specific location.


        Exactly one of `userID` or `profileID` must be provided (mutually exclusive).


        When `rotationPatternEnabled` is true, both `rotationWeeksOn` and `rotationWeeksOff` are required.


        Capacity values are in minutes per day (0-1440). Time values use HH:MM or HH:MM:SS format.'
