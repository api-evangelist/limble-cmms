      description: 'This request creates a new Priority.


        When providing priorityLevel or isDefault, calls to this endpoint may reorder or otherwise adjust other priorities.


        Parameter: name, Type: String, Required?: Required, Description: The title of this priority.

        Parameter: priorityLevel, Type: Int, Required?: Required, Description: What level is this priority? If we''re inserting a priority in the middle of the levels, priorities with a priorityLevel equal-to or greater-than the specified priorityLevel will have their priorityLevel incremented by one. This can only be between the numbers 1 and the current highest priorityLevel + 1.

        Parameter: color, Type: String, Required?: Optional, Description: This is the color that will be shown on all tasks with this priority. Default is #429b1f

        Parameter: isDefault, Type: Boolean, Required?: Optional, Description: Should this be the default priority that tasks are assigned to when a priority is not specified? Default is false. If isDefault is true, then any other priorities will have their isDefault set to false.'
