      - Tasks
      description: 'This request will create a new Instruction for a Task.


        Parameter: type, Type: Int, Required?: Required, Description: The type of each checklist item., 1 = Check Box; 2 = Option List; 3 = Text Box; 4 = Dropdown List; 5 = Date Picker; 7 = Label; 9 = File or Picture Attachment; 11 = Deadline Date Picker; 13 = Number; 14 = Start WO; 15 = Capture Signature., Item types not listed here are not currently supported. If you would like another item type to be supported, please contact us at product@limblecmms.com.

        Parameter: instruction, Type: string, Required?: Required, Description: The text that guides a User on what to do on this Instruction.

