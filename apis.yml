apis:
  - aid: limble-cmms:limble-api-v2
    name: Limble API V2
    description: >-
      The Limble CMMS REST API V2 provides HTTPS access to maintenance management
      data including assets, locations, work orders, preventive maintenance tasks, parts,
      purchase orders, users, vendors, teams, roles, budgets, and webhooks. Uses Basic
      authentication. Regional endpoints available for US, Canada, Australia, and Europe,
      plus a dedicated 21 CFR Part 11 compliant endpoint for pharmaceutical and life
      sciences manufacturing.
    humanURL: https://apidocs.limblecmms.com/
    baseURL: https://api.limblecmms.com
